<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlante del Rap Italiano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,900&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ECEDE9; --card:#F4F4F0; --ink:#23262E; --soft:#697079; --faint:#A6ABB3; --hair:#D3D5CF;
  --accent:#4E6076; --dot:#2C333E;
  --serif:"Fraunces",Georgia,serif; --sans:"Inter",system-ui,sans-serif; --mono:"Space Mono",ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0}
#map{width:100%;height:100%;display:block}
.rg{cursor:pointer;pointer-events:all;transition:opacity .3s ease}
.rg.dim{opacity:0.30}
.rg.sel{stroke:var(--ink);stroke-width:0.7}
.cdot{fill:var(--dot)}
.clbl{fill:var(--ink);font-family:var(--mono)}

.mast{position:fixed;top:26px;left:30px;z-index:10;pointer-events:none}
.ey{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
.tit{font-family:var(--serif);font-weight:900;font-size:clamp(26px,3.6vw,42px);line-height:.96;letter-spacing:-.01em;margin:.16em 0 0}
.yr{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--accent);margin-top:11px}
.sub{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em;margin-top:7px}
.colophon{position:fixed;left:30px;bottom:26px;z-index:10;max-width:35ch;font-family:var(--serif);font-style:italic;
  font-size:13px;line-height:1.5;color:var(--soft);pointer-events:none}

.back{position:fixed;top:28px;right:30px;z-index:10;display:none;align-items:center;gap:7px;font-family:var(--mono);
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);background:transparent;border:1px solid var(--hair);
  border-radius:999px;padding:8px 15px;cursor:pointer}
.back:hover{border-color:var(--ink)}

.ov{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:rgba(30,33,40,.34)}
.ov.show{display:flex}
.cardx{position:relative;width:min(380px,90vw);max-height:88vh;overflow-y:auto;background:var(--card);border:1px solid var(--hair);
  border-radius:7px;padding:26px 26px 22px;box-shadow:0 30px 70px rgba(28,30,36,.20)}
.cardx .x{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:1px solid var(--hair);
  background:transparent;cursor:pointer;color:var(--soft);font-size:14px}
.cardx .x:hover{border-color:var(--ink);color:var(--ink)}
.cardx .nm{font-family:var(--serif);font-weight:900;font-size:30px;line-height:1;margin:0 0 4px;letter-spacing:-.01em}
.cardx .loc{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--accent);margin-bottom:16px}
.bio{font-size:14px;line-height:1.55;color:var(--soft);margin:0 0 4px;padding-bottom:14px;border-bottom:1px dotted var(--hair)}
.row{padding:9px 0;border-bottom:1px dotted var(--hair)}
.row .l{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.row .v{font-size:14px;color:var(--ink);line-height:1.45}
.disc{list-style:none;margin:4px 0 0;padding:0}
.disc li{font-size:13.5px;color:var(--ink);padding:3px 0;line-height:1.4}
.disc li em{font-style:italic}
.disc li span{color:var(--soft)}
.btns{display:flex;gap:9px;margin-top:18px}
.btns a{flex:1;text-decoration:none;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  background:transparent;border:1px solid var(--ink);border-radius:999px;padding:10px 0;color:var(--ink);transition:.18s}
.btns a:hover{background:var(--ink);color:var(--bg)}
.src{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:14px;text-align:right}

.chips{position:fixed;z-index:20;display:none;background:var(--card);border:1px solid var(--hair);border-radius:7px;
  padding:13px 15px;min-width:188px;box-shadow:0 16px 38px rgba(28,30,36,.14)}
.chips .ct{font-family:var(--serif);font-weight:900;font-size:18px;margin:0 0 4px}
.chips .cn{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
.chips button{display:flex;width:100%;justify-content:space-between;align-items:center;gap:12px;background:transparent;border:0;
  border-top:1px dotted var(--hair);padding:9px 0;font-size:14px;color:var(--ink);cursor:pointer;font-family:var(--sans);text-align:left}
.chips button:hover{color:var(--accent)}
.chips button .ar{color:var(--faint);font-family:var(--mono);font-size:11px}

@media (max-width:640px){
  .mast{top:14px;left:16px;max-width:78vw}
  .yr{margin-top:8px}
  .back{top:14px;right:14px}
  .colophon{left:16px;right:16px;bottom:16px;max-width:none;font-size:12px}
  .cardx{padding:22px 18px 18px}
  .chips{max-width:82vw}
  .btns{flex-wrap:wrap}
  .btns a{flex:1 1 30%;padding:11px 0}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

/* palette: 20 sfumature dalle 5 ancore (fondo freddo) */
const ANCH=["A9DDD6","7A8B99","91ADC2","9BA0BC","C1B8C8"].map(h=>[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]);
const hx=c=>"#"+c.map(v=>Math.round(v).toString(16).padStart(2,"0")).join("");
function rampc(t){const seg=(ANCH.length-1)*t;let i=Math.min(ANCH.length-2,Math.floor(seg));const f=seg-i;const a=ANCH[i],b=ANCH[i+1];return [a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f];}

function parseCSV(t){t=t.replace(/\r\n?/g,"\n");const rows=[];let f="",row=[],q=false;for(let i=0;i<t.length;i++){const c=t[i];if(q){if(c==='"'){if(t[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}else{if(c==='"'){q=true;}else if(c===","){row.push(f);f="";}else if(c==="\n"){row.push(f);rows.push(row);row=[];f="";}else f+=c;}}if(f.length||row.length){row.push(f);rows.push(row);}if(!rows.length)return [];const head=rows.shift().map(h=>h.trim());return rows.filter(r=>r.some(x=>x.trim())).map(r=>{const o={};head.forEach((h,i)=>o[h]=(r[i]||"").trim());return o;});}
function splitList(s){return (s||"").split(";").map(x=>x.trim()).filter(Boolean);}
function parseMember(s){const m=s.match(/^(.*?)\s*\(([^()]*)\)\s*$/);return m?[m[1].trim(),m[2].trim()]:[s];}
function parseRelease(s){const m=s.match(/^(.*)\(([^()]*),\s*(\d{4})\)\s*$/);return m?[m[1].trim(),m[2].trim(),m[3]]:[s,"",""];}

let DATA={}, CITYXY={};
const norm=s=>(s||"").toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').split('/')[0].replace(/-/g,' ').replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
const REGMAP={};PRE.reg.forEach(r=>REGMAP[norm(r.n)]=r.n);
function canonReg(s){return REGMAP[norm(s)]||s;}
function buildData(rows){
  DATA={};CITYXY={};
  rows.forEach(r=>{
    if(!r.nome||!r.regione||!r.citta)return;
    const reg=canonReg(r.regione), city=r.citta.trim();
    (DATA[reg]=DATA[reg]||{});(DATA[reg][city]=DATA[reg][city]||[]);
    DATA[reg][city].push({nome:r.nome,tipo:r.tipo,attivita:r.attivita,bio:r.bio,crew:r.crew,
      membri:splitList(r.membri).map(parseMember),disco:splitList(r.discografia).map(parseRelease),
      ascolto:r.ascolto,discogs:r.discogs,wiki:r.wiki});
    const key=reg+"|"+city;
    if(!CITYXY[key]&&r.lat&&r.lon){const la=parseFloat(String(r.lat).replace(',','.')),lo=parseFloat(String(r.lon).replace(',','.'));if(isFinite(la)&&isFinite(lo))CITYXY[key]=proj(lo,la);}
  });
}

/* ---------- map ---------- */
const W=PRE.W,H=PRE.H,ns="http://www.w3.org/2000/svg";
const map=document.getElementById('map'),back=document.getElementById('back'),chips=document.getElementById('chips'),ov=document.getElementById('ov');
const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
let features={},current=null,curView=[0,0,W,H];
function setVB(s){map.setAttribute('viewBox',s.map(v=>+v.toFixed(1)).join(' '));}
function tVB(b){let[x0,y0,x1,y1]=b,w=x1-x0,h=y1-y0,cx=(x0+x1)/2,cy=(y0+y1)/2;w*=1.5;h*=1.5;const a=W/H;if(w/h>a)h=w/a;else w=h*a;return[cx-w/2,cy-h/2,w,h];}
function animVB(to){if(reduce){curView=to.slice();setVB(to);return;}const f=curView.slice(),t0=performance.now();curView=to.slice();(function st(now){const p=Math.min(1,(now-t0)/520),e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;setVB(f.map((v,i)=>v+(to[i]-v)*e));if(p<1)requestAnimationFrame(st);})(t0);}
function clearCities(){const g=document.getElementById('cities');if(g)g.remove();}
function svgToPage(px,py){const r=map.getBoundingClientRect(),vb=curView,sc=Math.min(r.width/vb[2],r.height/vb[3]);const ox=r.left+(r.width-vb[2]*sc)/2,oy=r.top+(r.height-vb[3]*sc)/2;return[ox+(px-vb[0])*sc,oy+(py-vb[1])*sc];}
function drawCities(reg,vb){clearCities();if(!DATA[reg])return;const g=document.createElementNS(ns,'g');g.id='cities';map.appendChild(g);const upp=vb[2]/300,r=2.7*upp,fs=10*upp;Object.keys(DATA[reg]).forEach(city=>{const p=CITYXY[reg+"|"+city];if(!p)return;const go=ev=>{ev.stopPropagation();openChips(reg,city);};const hit=document.createElementNS(ns,'circle');hit.setAttribute('cx',p[0]);hit.setAttribute('cy',p[1]);hit.setAttribute('r',Math.max(r*3.4,7*upp));hit.setAttribute('fill','transparent');hit.style.cursor='pointer';hit.addEventListener('click',go);const dot=document.createElementNS(ns,'circle');dot.setAttribute('class','cdot');dot.setAttribute('cx',p[0]);dot.setAttribute('cy',p[1]);dot.setAttribute('r',r);dot.style.cursor='pointer';const tx=document.createElementNS(ns,'text');tx.setAttribute('class','clbl');tx.setAttribute('x',p[0]+r+1.6*upp);tx.setAttribute('y',p[1]+fs*0.35);tx.setAttribute('font-size',fs);tx.textContent=city;tx.style.cursor='pointer';dot.addEventListener('click',go);tx.addEventListener('click',go);g.appendChild(hit);g.appendChild(dot);g.appendChild(tx);});}
function selectRegion(name){current=name;back.style.display='inline-flex';chips.style.display='none';Object.entries(features).forEach(([n,el])=>{el.classList.toggle('sel',n===name);el.classList.toggle('dim',n!==name);});const vb=tVB(PRE.reg.find(r=>r.n===name).b);animVB(vb);setTimeout(()=>drawCities(name,vb),140);}
function openChips(reg,city){const arts=DATA[reg][city],p=CITYXY[reg+"|"+city],xy=svgToPage(p[0],p[1]);chips.innerHTML='<div class="ct">'+city+'</div><div class="cn">'+reg+' · '+arts.length+' voci</div>'+arts.map((a,i)=>'<button data-i="'+i+'"><span>'+a.nome+'</span><span class="ar">→</span></button>').join('');chips.style.display='block';const vw=innerWidth,vh=innerHeight;chips.style.left=Math.min(Math.max(xy[0]+10,12),vw-210)+'px';chips.style.top=Math.min(Math.max(xy[1]-12,12),vh-200)+'px';chips.querySelectorAll('button[data-i]').forEach(b=>b.addEventListener('click',()=>openCard(arts[+b.dataset.i],reg,city)));}
function openCard(a,reg,city){
  let h='<div class="cardx"><button class="x" aria-label="Chiudi">✕</button>'+
    '<div class="nm">'+a.nome+'</div>'+
    '<div class="loc">'+[a.tipo,a.attivita].filter(Boolean).join(', ')+'</div>';
  if(a.bio) h+='<p class="bio">'+a.bio+'</p>';
  if(a.crew) h+='<div class="row"><div class="l">Crew</div><div class="v">'+a.crew+'</div></div>';
  if(a.membri&&a.membri.length) h+='<div class="row"><div class="l">Membri</div><ul class="disc">'+
    a.membri.map(m=>'<li>'+m[0]+(m[1]?' <span>('+m[1]+')</span>':'')+'</li>').join('')+'</ul></div>';
  if(a.disco&&a.disco.length) h+='<div class="row"><div class="l">Discografia</div><ul class="disc">'+
    a.disco.map(d=>'<li><em>'+d[0]+'</em>'+(d[1]||d[2]?' <span>('+[d[1],d[2]].filter(Boolean).join(', ')+')</span>':'')+'</li>').join('')+'</ul></div>';
  let lk='';
  if(a.ascolto) lk+='<a href="'+a.ascolto+'" target="_blank" rel="noopener">▶ Ascolta</a>';
  if(a.discogs) lk+='<a href="'+a.discogs+'" target="_blank" rel="noopener">Discogs</a>';
  if(a.wiki) lk+='<a href="'+a.wiki+'" target="_blank" rel="noopener">Wiki</a>';
  if(lk) h+='<div class="btns">'+lk+'</div>';
  h+='<div class="src">'+city+' · '+reg+'</div></div>';
  ov.innerHTML=h;ov.classList.add('show');
  ov.querySelector('.x').addEventListener('click',()=>ov.classList.remove('show'));
  ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('show');});
}
function reset(){current=null;back.style.display='none';chips.style.display='none';ov.classList.remove('show');clearCities();Object.values(features).forEach(el=>el.classList.remove('sel','dim'));animVB([0,0,W,H]);}
back.addEventListener('click',reset);
function renderMap(){
  map.innerHTML='';features={};
  PRE.reg.forEach((rg,i)=>{const p=document.createElementNS(ns,'path');p.setAttribute('class','rg');p.setAttribute('d',rg.d);p.setAttribute('fill',COLS[i]);p.setAttribute('stroke','var(--bg)');p.setAttribute('stroke-width','0.9');p.setAttribute('stroke-linejoin','round');p.addEventListener('click',ev=>{ev.stopPropagation();selectRegion(rg.n);});map.appendChild(p);features[rg.n]=p;});
  const ovl=document.createElementNS(ns,'g');ovl.setAttribute('fill','none');ovl.setAttribute('stroke','#0000001A');ovl.setAttribute('stroke-width','0.4');ovl.setAttribute('stroke-linejoin','round');ovl.setAttribute('pointer-events','none');PRE.reg.forEach(rg=>{const p=document.createElementNS(ns,'path');p.setAttribute('d',rg.d);ovl.appendChild(p);});map.appendChild(ovl);
}
map.addEventListener('click',()=>{chips.style.display='none';});

/* ---------- boot ---------- */
function start(rows){if(!rows||!rows.length||!rows.some(r=>r.nome&&r.regione&&r.citta))rows=parseCSV(SEED_CSV);buildData(rows);renderMap();}
(function boot(){
  if(SHEET_CSV_URL){fetch(SHEET_CSV_URL).then(r=>r.text()).then(t=>start(parseCSV(t))).catch(()=>start(parseCSV(SEED_CSV)));}
  else start(parseCSV(SEED_CSV));
})();
</script>
</body>
